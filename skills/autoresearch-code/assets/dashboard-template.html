<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autoresearch Code Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #fbfbfd;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --baseline: #7aa2f7;
      --keep: #74c69d;
      --discard: #f28482;
      --idle: #fde68a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #fdfdfd 0%, #f7f8fc 100%);
      color: var(--text);
    }

    .shell {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.05);
    }

    h1, h2 {
      margin: 0 0 12px;
      font-weight: 650;
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: #fef3c7;
      color: #92400e;
      font-size: 14px;
      font-weight: 600;
    }

    .grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    }

    .metric {
      display: grid;
      gap: 6px;
    }

    .metric strong {
      font-size: 28px;
      line-height: 1;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      padding: 10px 8px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }

    .empty {
      padding: 16px;
      border: 1px dashed var(--border);
      border-radius: 12px;
      color: var(--muted);
      background: #fcfcff;
    }

    ul {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="panel">
      <h1>Autoresearch Code Dashboard</h1>
      <p id="subtitle">Loading results.json...</p>
    </section>

    <section class="panel">
      <div class="status" id="status-pill">Idle</div>
    </section>

    <section class="grid">
      <div class="panel metric">
        <p>Baseline Score</p>
        <strong id="baseline-score">-</strong>
      </div>
      <div class="panel metric">
        <p>Latest Pass Rate</p>
        <strong id="latest-pass-rate">-</strong>
      </div>
      <div class="panel metric">
        <p>Best Score</p>
        <strong id="best-score">-</strong>
      </div>
      <div class="panel metric">
        <p>Current Experiment</p>
        <strong id="current-exp">0</strong>
      </div>
    </section>

    <section class="panel">
      <h2>Score Progression</h2>
      <canvas id="score-chart" height="120"></canvas>
    </section>

    <section class="panel">
      <h2>Experiments</h2>
      <div id="experiments-wrap" class="empty">No experiments recorded yet.</div>
    </section>

    <section class="panel">
      <h2>Eval Breakdown</h2>
      <div id="eval-wrap" class="empty">No eval data recorded yet.</div>
    </section>
  </div>

  <script>
    let chart;

    function injectScript(src) {
      return new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = src;
        script.onload = resolve;
        script.onerror = reject;
        document.head.appendChild(script);
      });
    }

    function toPercent(value) {
      return value == null ? "-" : `${value}%`;
    }

    function renderExperiments(experiments) {
      const wrap = document.getElementById("experiments-wrap");
      if (!experiments.length) {
        wrap.className = "empty";
        wrap.textContent = "No experiments recorded yet.";
        return;
      }

      const rows = experiments.map((exp) => `
        <tr>
          <td>${exp.id}</td>
          <td>${exp.score}/${exp.max_score}</td>
          <td>${toPercent(exp.pass_rate)}</td>
          <td>${exp.status}</td>
          <td>${exp.description}</td>
        </tr>
      `).join("");

      wrap.className = "";
      wrap.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Score</th>
              <th>Pass Rate</th>
              <th>Status</th>
              <th>Description</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    function renderBreakdown(items) {
      const wrap = document.getElementById("eval-wrap");
      if (!items.length) {
        wrap.className = "empty";
        wrap.textContent = "No eval data recorded yet.";
        return;
      }

      wrap.className = "";
      wrap.innerHTML = `<ul>${items.map((item) =>
        `<li>${item.name}: ${item.pass_count}/${item.total}</li>`).join("")}</ul>`;
    }

    function renderChart(experiments) {
      const ctx = document.getElementById("score-chart");
      const labels = experiments.map((exp) => exp.id);
      const data = experiments.map((exp) => exp.pass_rate);

      if (chart) chart.destroy();

      chart = new Chart(ctx, {
        type: "line",
        data: {
          labels,
          datasets: [{
            label: "Pass Rate %",
            data,
            borderColor: "#7aa2f7",
            backgroundColor: "rgba(122, 162, 247, 0.2)",
            fill: true,
            tension: 0.25,
            pointRadius: 4
          }]
        },
        options: {
          responsive: true,
          scales: {
            y: { min: 0, max: 100 }
          }
        }
      });
    }

    function applyData(data) {
      if (!data) {
        throw new Error("No results data available");
      }

      const codebaseName = data.codebase_name || "unknown-codebase";
      document.getElementById("subtitle").textContent =
        `${codebaseName} workspace in .hypercore/autoresearch-code/${codebaseName}/`;

      document.getElementById("status-pill").textContent =
        data.status === "running" ? `Running experiment ${data.current_experiment}` :
        data.status === "complete" ? "Complete" :
        "Idle";
      document.getElementById("baseline-score").textContent = toPercent(data.baseline_score);
      const latest = (data.experiments || []).length
        ? data.experiments[data.experiments.length - 1].pass_rate
        : null;
      document.getElementById("latest-pass-rate").textContent = toPercent(latest);
      document.getElementById("best-score").textContent = toPercent(data.best_score);
      document.getElementById("current-exp").textContent = data.current_experiment ?? 0;

      renderExperiments(data.experiments || []);
      renderBreakdown(data.eval_breakdown || []);
      renderChart(data.experiments || []);
    }

    async function refresh() {
      if (window.location.protocol === "file:") {
        delete window.__AUTORESEARCH_CODE_RESULTS__;
        await injectScript(`./results.js?ts=${Date.now()}`);
        applyData(window.__AUTORESEARCH_CODE_RESULTS__);
        return;
      }

      const response = await fetch("./results.json", { cache: "no-store" });
      const data = await response.json();
      applyData(data);
    }

    refresh().catch((error) => {
      document.getElementById("subtitle").textContent = `Failed to load results: ${error.message}`;
    });
    setInterval(() => refresh().catch(() => {}), 10000);
  </script>
</body>
</html>
