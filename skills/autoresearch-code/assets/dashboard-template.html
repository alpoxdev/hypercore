<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>코드 오토리서치 대시보드</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #fbfbfd;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --baseline: #7aa2f7;
      --keep: #16a34a;
      --discard: #dc2626;
      --warn: #d97706;
      --idle: #fde68a;
      --soft: #f8fafc;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: linear-gradient(180deg, #fdfdfd 0%, #f7f8fc 100%);
      color: var(--text);
    }

    .shell { max-width: 1180px; margin: 0 auto; display: grid; gap: 16px; }
    .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 18px; box-shadow: 0 12px 30px rgba(15, 23, 42, 0.05); }
    h1, h2, h3 { margin: 0 0 12px; font-weight: 650; }
    p { margin: 0; color: var(--muted); }
    .grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }
    .metric { display: grid; gap: 6px; }
    .metric strong { font-size: 28px; line-height: 1; }
    .status { display: inline-flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 999px; background: #fef3c7; color: #92400e; font-size: 14px; font-weight: 700; }
    .badge { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 999px; font-size: 12px; font-weight: 700; background: #eef2ff; color: #3730a3; }
    .badge.keep, .badge.keep-reworked { background: #dcfce7; color: #166534; }
    .badge.discard, .badge.rollback, .badge.crash { background: #fee2e2; color: #991b1b; }
    .badge.reset, .badge.metric-error, .badge.hook-blocked { background: #fef3c7; color: #92400e; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { padding: 10px 8px; border-bottom: 1px solid var(--border); text-align: left; vertical-align: top; }
    th { color: #374151; background: #fcfcfd; }
    .empty { padding: 16px; border: 1px dashed var(--border); border-radius: 12px; color: var(--muted); background: #fcfcff; }
    ul { margin: 0; padding-left: 18px; color: var(--muted); }
    .summary { display: grid; gap: 12px; }
    .summary-lead { padding: 14px; border-radius: 12px; background: #f0f9ff; color: #075985; line-height: 1.55; }
    .kv { display: grid; gap: 8px; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); }
    .kv div { padding: 10px; border: 1px solid var(--border); border-radius: 12px; background: var(--soft); }
    .kv span { display: block; color: var(--muted); font-size: 12px; margin-bottom: 4px; }
    .markdown-body { color: var(--text); line-height: 1.6; overflow-wrap: anywhere; }
    .markdown-body h1, .markdown-body h2, .markdown-body h3 { margin-top: 12px; margin-bottom: 8px; }
    .markdown-body p { margin: 8px 0; color: var(--text); }
    .markdown-body ul { margin: 8px 0; }
    .markdown-body code { padding: 2px 5px; border-radius: 6px; background: #f1f5f9; color: #0f172a; }
    .markdown-body pre { padding: 12px; overflow: auto; border-radius: 12px; background: #0f172a; color: #e2e8f0; }
    .markdown-body pre code { background: transparent; color: inherit; padding: 0; }
    details { border: 1px solid var(--border); border-radius: 12px; padding: 12px; background: #fff; }
    details + details { margin-top: 10px; }
    summary { cursor: pointer; font-weight: 700; }
  </style>
</head>
<body>
  <div class="shell">
    <section class="panel">
      <h1>코드 오토리서치 대시보드</h1>
      <p id="subtitle">results.json을 불러오는 중...</p>
    </section>

    <section class="panel"><div class="status" id="status-pill">대기 중</div></section>

    <section class="grid">
      <div class="panel metric"><p>기준 점수</p><strong id="baseline-score">-</strong></div>
      <div class="panel metric"><p>최신 통과율</p><strong id="latest-pass-rate">-</strong></div>
      <div class="panel metric"><p>최고 점수</p><strong id="best-score">-</strong></div>
      <div class="panel metric"><p>현재 실험</p><strong id="current-exp">0</strong></div>
    </section>

    <section class="panel">
      <h2>코드 개선 요약</h2>
      <div id="code-summary-wrap" class="empty">아직 코드 개선 설명이 없습니다.</div>
    </section>

    <section class="panel">
      <h2>점수 추이</h2>
      <canvas id="score-chart" height="120"></canvas>
    </section>

    <section class="panel">
      <h2>실험 기록</h2>
      <div id="experiments-wrap" class="empty">아직 기록된 실험이 없습니다.</div>
    </section>

    <section class="grid">
      <div class="panel"><h2>실행 메타데이터</h2><div id="meta-wrap" class="empty">아직 기록된 메타데이터가 없습니다.</div></div>
      <div class="panel"><h2>최신 차원 점수</h2><div id="dimensions-wrap" class="empty">아직 기록된 차원 점수가 없습니다.</div></div>
    </section>

    <section class="panel"><h2>평가 분해</h2><div id="eval-wrap" class="empty">아직 기록된 평가 데이터가 없습니다.</div></section>

    <section class="panel">
      <h2>상세 로그</h2>
      <div id="details-wrap" class="empty">아직 렌더링할 상세 로그가 없습니다.</div>
    </section>
  </div>

  <script>
    let generatedLoaded = false;

    function injectScript(src) {
      return new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = src;
        script.onload = resolve;
        script.onerror = reject;
        document.head.appendChild(script);
      });
    }

    async function loadGeneratedData() {
      if (generatedLoaded) return;
      delete window.__AUTORESEARCH_CODE_RESULTS__;
      delete window.__AUTORESEARCH_CODE_DETAILS__;
      await injectScript(`./results.js?ts=${Date.now()}`);
      generatedLoaded = true;
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[char]));
    }

    function inlineMarkdown(text) {
      let value = escapeHtml(text);
      value = value.replace(/`([^`]+)`/g, "<code>$1</code>");
      value = value.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      value = value.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, (match, label, href) => {
        const safeHref = href.startsWith("http://") || href.startsWith("https://") || href.startsWith("./") || href.startsWith("../") ? href : "#";
        return `<a href="${escapeHtml(safeHref)}" target="_blank" rel="noreferrer">${label}</a>`;
      });
      return value;
    }

    function renderMarkdown(markdown) {
      const lines = String(markdown ?? "").replace(/\r\n/g, "\n").split("\n");
      const out = [];
      let inList = false;
      let inFence = false;
      let fence = [];
      const closeList = () => { if (inList) { out.push("</ul>"); inList = false; } };
      for (const line of lines) {
        if (line.trim().startsWith("```")) {
          if (inFence) {
            out.push(`<pre><code>${escapeHtml(fence.join("\n"))}</code></pre>`);
            fence = [];
            inFence = false;
          } else {
            closeList();
            inFence = true;
          }
          continue;
        }
        if (inFence) { fence.push(line); continue; }
        if (/^###\s+/.test(line)) { closeList(); out.push(`<h3>${inlineMarkdown(line.replace(/^###\s+/, ""))}</h3>`); continue; }
        if (/^##\s+/.test(line)) { closeList(); out.push(`<h2>${inlineMarkdown(line.replace(/^##\s+/, ""))}</h2>`); continue; }
        if (/^#\s+/.test(line)) { closeList(); out.push(`<h1>${inlineMarkdown(line.replace(/^#\s+/, ""))}</h1>`); continue; }
        if (/^[-*]\s+/.test(line)) {
          if (!inList) { out.push("<ul>"); inList = true; }
          out.push(`<li>${inlineMarkdown(line.replace(/^[-*]\s+/, ""))}</li>`);
          continue;
        }
        if (!line.trim()) { closeList(); continue; }
        closeList();
        out.push(`<p>${inlineMarkdown(line)}</p>`);
      }
      if (inFence) out.push(`<pre><code>${escapeHtml(fence.join("\n"))}</code></pre>`);
      closeList();
      return out.join("\n");
    }

    function toPercent(value) {
      return value == null || value === "" ? "-" : `${escapeHtml(value)}%`;
    }

    function translateExperimentStatus(status) {
      const labels = { baseline: "기준선", keep: "유지", "keep-reworked": "재작업 후 유지", discard: "폐기", crash: "실패", "no-op": "변화 없음", "hook-blocked": "훅 차단", "metric-error": "지표 오류", reset: "초기화" };
      return labels[status] || status || "-";
    }

    function translatePromotionState(state) {
      const labels = { hold: "보류", promote: "승격", rollback: "롤백" };
      return labels[state] || state || "-";
    }

    function arrayList(items) {
      const values = (items || []).filter((item) => item != null && String(item).trim());
      if (!values.length) return "<span class=\"muted\">-</span>";
      return `<ul>${values.map((item) => `<li>${inlineMarkdown(item)}</li>`).join("")}</ul>`;
    }

    function renderCodeSummary(data) {
      const wrap = document.getElementById("code-summary-wrap");
      const explanation = data.code_explanation || null;
      const baseline = explanation?.baseline_score ?? data.baseline_score;
      const finalScore = explanation?.final_score ?? data.best_score;
      const delta = explanation?.delta ?? ((Number(finalScore) || 0) - (Number(baseline) || 0));
      const bestExperiment = explanation?.best_experiment ?? data.best_experiment ?? "-";
      const summary = explanation?.summary_ko || `기준 ${baseline}%에서 최고 ${finalScore}%로 ${delta >= 0 ? "+" : ""}${delta}%p 변화했습니다.`;
      const metricRows = (explanation?.metric_movements || []).map((item) => `
        <tr><td>${escapeHtml(item.metric_ko || item.metric || "-")}</td><td>${escapeHtml(item.before ?? "-")}</td><td>${escapeHtml(item.after ?? "-")}</td><td>${escapeHtml(item.delta_ko ?? item.delta ?? "-")}</td><td>${inlineMarkdown(item.evidence_ko || item.evidence || "-")}</td></tr>
      `).join("");
      const changeRows = (explanation?.code_changes || []).map((item) => `
        <tr><td><code>${escapeHtml(item.file || "-")}</code></td><td>${inlineMarkdown(item.change_ko || item.change || "-")}</td><td>${inlineMarkdown(item.why_kept_ko || item.reason || "-")}</td><td>${inlineMarkdown(item.guard_ko || item.guard || "-")}</td></tr>
      `).join("");
      wrap.className = "summary";
      wrap.innerHTML = `
        <div class="summary-lead">${inlineMarkdown(summary)}</div>
        <div class="kv">
          <div><span>기준 점수</span><strong>${escapeHtml(baseline)}%</strong></div>
          <div><span>최종/최고 점수</span><strong>${escapeHtml(finalScore)}%</strong></div>
          <div><span>변화량</span><strong>${escapeHtml(delta >= 0 ? `+${delta}` : delta)}%p</strong></div>
          <div><span>최고 실험</span><strong>${escapeHtml(bestExperiment)}</strong></div>
        </div>
        <p><strong>가장 효과가 컸던 변경:</strong> ${inlineMarkdown(explanation?.most_effective_change_ko || "아직 기록되지 않았습니다.")}</p>
        <h3>지표별 변화</h3>
        ${metricRows ? `<table><thead><tr><th>지표</th><th>이전</th><th>이후</th><th>변화</th><th>근거</th></tr></thead><tbody>${metricRows}</tbody></table>` : `<div class="empty">지표별 변화가 아직 없습니다.</div>`}
        <h3>코드 변경</h3>
        ${changeRows ? `<table><thead><tr><th>파일</th><th>수정 내용</th><th>유지 이유</th><th>Guard/Proof</th></tr></thead><tbody>${changeRows}</tbody></table>` : arrayList(explanation?.changed_files || [])}
        <h3>Proof command</h3>${arrayList(explanation?.proof_commands_ko || [])}
        <h3>Guard 결과</h3>${arrayList(explanation?.guard_results_ko || [])}
        <h3>남은 실패</h3>${arrayList(explanation?.remaining_failures_ko || [])}
      `;
    }

    function renderExperiments(experiments) {
      const wrap = document.getElementById("experiments-wrap");
      if (!experiments.length) { wrap.className = "empty"; wrap.textContent = "아직 기록된 실험이 없습니다."; return; }
      const rows = experiments.map((exp) => `
        <tr>
          <td>${escapeHtml(exp.id)}</td>
          <td>${escapeHtml(exp.score)}/${escapeHtml(exp.max_score)}</td>
          <td>${toPercent(exp.pass_rate)}</td>
          <td><span class="badge ${escapeHtml(exp.status)}">${escapeHtml(translateExperimentStatus(exp.status))}</span></td>
          <td>${escapeHtml(exp.delta ?? "-")}</td>
          <td>${escapeHtml(exp.guard ?? "-")}</td>
          <td>${escapeHtml(Array.isArray(exp.changed_files) ? exp.changed_files.join(", ") : (exp.changed_files || "-"))}</td>
          <td>${inlineMarkdown(exp.description || "-")}</td>
        </tr>
      `).join("");
      wrap.className = "";
      wrap.innerHTML = `<table><thead><tr><th>#</th><th>점수</th><th>통과율</th><th>상태</th><th>변화량</th><th>Guard</th><th>수정 파일</th><th>설명</th></tr></thead><tbody>${rows}</tbody></table>`;
    }

    function renderBreakdown(items) {
      const wrap = document.getElementById("eval-wrap");
      if (!items.length) { wrap.className = "empty"; wrap.textContent = "아직 기록된 평가 데이터가 없습니다."; return; }
      wrap.className = "";
      wrap.innerHTML = `<ul>${items.map((item) => `<li>${escapeHtml(item.name)}: ${escapeHtml(item.pass_count)}/${escapeHtml(item.total)}</li>`).join("")}</ul>`;
    }

    function renderMetadata(data) {
      const wrap = document.getElementById("meta-wrap");
      const scope = data.scope || {}; const pack = data.eval_pack || {}; const env = data.environment || {};
      const latest = (data.experiments || []).length ? data.experiments[data.experiments.length - 1] : null;
      const rows = [
        ["범위", [scope.kind, scope.label].filter(Boolean).join(": ") || "-"],
        ["Eval 팩", [pack.name, pack.type, pack.version].filter(Boolean).join(" | ") || "-"],
        ["환경", [env.os, env.runtime].filter(Boolean).join(" | ") || "-"],
        ["승격 상태", translatePromotionState(latest?.promotion_state)],
        ["Proof command", (data.proof_commands?.commands || []).join(" | ") || data.proof_commands?.hash || "-"]
      ];
      wrap.className = "";
      wrap.innerHTML = `<table><tbody>${rows.map(([label, value]) => `<tr><th>${escapeHtml(label)}</th><td>${escapeHtml(value)}</td></tr>`).join("")}</tbody></table>`;
    }

    function renderDimensions(experiments) {
      const wrap = document.getElementById("dimensions-wrap");
      const latest = experiments.length ? experiments[experiments.length - 1] : null;
      const dimensions = latest?.dimensions || null;
      if (!dimensions || !Object.keys(dimensions).length) { wrap.className = "empty"; wrap.textContent = "아직 기록된 차원 점수가 없습니다."; return; }
      wrap.className = "";
      wrap.innerHTML = `<table><thead><tr><th>차원</th><th>점수</th></tr></thead><tbody>${Object.entries(dimensions).map(([name, value]) => `<tr><td>${escapeHtml(name)}</td><td>${escapeHtml(value)}</td></tr>`).join("")}</tbody></table>`;
    }

    function renderDetails(details) {
      const wrap = document.getElementById("details-wrap");
      if (!details || !details.length) { wrap.className = "empty"; wrap.textContent = "아직 렌더링할 상세 로그가 없습니다."; return; }
      wrap.className = "";
      wrap.innerHTML = details.map((detail, index) => `
        <details ${index === 0 ? "open" : ""}>
          <summary>${escapeHtml(detail.title || detail.path)} <span class="badge">${escapeHtml(detail.path || "")}</span></summary>
          <div class="markdown-body">${renderMarkdown(detail.content || "")}</div>
        </details>
      `).join("");
    }

    function renderChart(experiments) {
      const canvas = document.getElementById("score-chart");
      const ctx = canvas.getContext("2d");
      const width = canvas.clientWidth || canvas.parentElement.clientWidth || 640;
      const height = Number(canvas.getAttribute("height")) || 120;
      const ratio = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.floor(width * ratio)); canvas.height = Math.max(1, Math.floor(height * ratio));
      canvas.style.width = `${width}px`; canvas.style.height = `${height}px`; ctx.setTransform(ratio, 0, 0, ratio, 0, 0); ctx.clearRect(0, 0, width, height);
      const values = experiments.map((exp) => Number(exp.pass_rate)).filter((value) => Number.isFinite(value));
      const pad = 24; const plotWidth = Math.max(1, width - pad * 2); const plotHeight = Math.max(1, height - pad * 2);
      ctx.strokeStyle = "#e5e7eb"; ctx.lineWidth = 1;
      for (const tick of [0, 25, 50, 75, 100]) { const y = pad + ((100 - tick) / 100) * plotHeight; ctx.beginPath(); ctx.moveTo(pad, y); ctx.lineTo(width - pad, y); ctx.stroke(); }
      if (!values.length) { ctx.fillStyle = "#6b7280"; ctx.font = "13px sans-serif"; ctx.fillText("아직 점수 데이터가 없습니다.", pad, height / 2); return; }
      const pointFor = (value, index) => [values.length === 1 ? pad + plotWidth / 2 : pad + (index / (values.length - 1)) * plotWidth, pad + ((100 - Math.max(0, Math.min(100, value))) / 100) * plotHeight];
      ctx.beginPath(); values.forEach((value, index) => { const [x, y] = pointFor(value, index); if (index === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y); }); ctx.strokeStyle = "#7aa2f7"; ctx.lineWidth = 2; ctx.stroke();
      ctx.fillStyle = "#7aa2f7"; values.forEach((value, index) => { const [x, y] = pointFor(value, index); ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI * 2); ctx.fill(); });
      ctx.fillStyle = "#6b7280"; ctx.font = "11px sans-serif"; ctx.fillText("0%", 2, height - pad + 4); ctx.fillText("100%", 2, pad + 4);
    }

    function applyData(data, details) {
      if (!data) throw new Error("results 데이터가 없습니다");
      const codebaseName = data.codebase_name || data.skill_name || "unknown-codebase";
      document.getElementById("subtitle").textContent = `${codebaseName} 워크스페이스: .hypercore/autoresearch-code/${codebaseName}/`;
      document.getElementById("status-pill").textContent = data.status === "running" ? `실험 ${data.current_experiment} 실행 중` : data.status === "complete" ? "완료" : "대기 중";
      document.getElementById("baseline-score").textContent = toPercent(data.baseline_score);
      const latest = (data.experiments || []).length ? data.experiments[data.experiments.length - 1].pass_rate : null;
      document.getElementById("latest-pass-rate").textContent = toPercent(latest);
      document.getElementById("best-score").textContent = toPercent(data.best_score);
      document.getElementById("current-exp").textContent = data.current_experiment ?? 0;
      renderCodeSummary(data);
      renderExperiments(data.experiments || []);
      renderMetadata(data);
      renderDimensions(data.experiments || []);
      renderBreakdown(data.eval_breakdown || []);
      renderDetails(details || []);
      renderChart(data.experiments || []);
    }

    async function refresh() {
      await loadGeneratedData().catch(() => {});
      if (window.location.protocol === "file:") {
        applyData(window.__AUTORESEARCH_CODE_RESULTS__, window.__AUTORESEARCH_CODE_DETAILS__ || []);
        return;
      }
      const response = await fetch("./results.json", { cache: "no-store" });
      const data = await response.json();
      applyData(data, window.__AUTORESEARCH_CODE_DETAILS__ || []);
    }

    refresh().catch((error) => { document.getElementById("subtitle").textContent = `결과를 불러오지 못했습니다: ${error.message}`; });
    setInterval(() => refresh().catch(() => {}), 10000);
  </script>
</body>
</html>
