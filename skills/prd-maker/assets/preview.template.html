<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{TITLE}} · Planning Package Preview</title>
  <style>
    :root {
      --bg: #f7f7f5;
      --panel: #ffffff;
      --ink: #202126;
      --muted: #73737d;
      --line: #e8e5df;
      --accent: #ff5b6e;
      --accent-2: #f59e0b;
      --shadow: 0 18px 55px rgba(24, 24, 27, 0.10);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20px 20px, rgba(0,0,0,.055) 1.2px, transparent 1.2px) 0 0 / 22px 22px,
        linear-gradient(180deg, #fbfbfa 0%, var(--bg) 100%);
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(18px);
      background: rgba(247, 247, 245, 0.82);
      border-bottom: 1px solid var(--line);
    }
    .bar, main { max-width: 1220px; margin: 0 auto; padding: 18px 24px; }
    .bar { display: flex; align-items: center; gap: 16px; justify-content: space-between; }
    .brand { display: flex; flex-direction: column; gap: 4px; }
    .eyebrow { color: var(--accent); font-size: 12px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; }
    h1 { margin: 0; font-size: clamp(24px, 3vw, 42px); line-height: 1.05; }
    .meta { color: var(--muted); font-size: 13px; }
    .tabs { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .tab {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.8);
      border-radius: 999px;
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 700;
      color: #34343a;
      cursor: pointer;
    }
    .tab[aria-selected="true"] { color: #fff; border-color: var(--ink); background: var(--ink); }
    main { padding-top: 28px; padding-bottom: 64px; }
    .hero { display: grid; grid-template-columns: minmax(0, 1.05fr) minmax(320px, .95fr); gap: 22px; align-items: stretch; }
    .card {
      background: rgba(255,255,255,.92);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .card.pad { padding: 24px; }
    .diagram { min-height: 420px; display: grid; place-items: center; background: #fafafa; }
    .diagram svg { width: 100%; height: auto; display: block; }
    .empty-diagram { padding: 28px; color: var(--muted); text-align: center; }
    .summary-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; margin-top: 18px; }
    .metric { border: 1px solid var(--line); border-radius: 16px; padding: 14px; background: #fffaf7; }
    .metric strong { display: block; font-size: 22px; }
    .metric span { color: var(--muted); font-size: 12px; }
    section.doc { display: none; margin-top: 24px; }
    section.doc.active { display: block; }
    .doc h2 { margin: 0; padding: 18px 22px; border-bottom: 1px solid var(--line); }
    .content { padding: 22px; line-height: 1.65; }
    .content h1, .content h2, .content h3 { line-height: 1.2; margin-top: 1.2em; }
    .content h1:first-child, .content h2:first-child, .content h3:first-child { margin-top: 0; }
    .content pre { overflow: auto; background: #1f2328; color: #f5f5f5; padding: 16px; border-radius: 14px; }
    .content code { background: #f1f1ef; padding: 2px 5px; border-radius: 6px; }
    .content pre code { background: transparent; padding: 0; }
    .content table { border-collapse: collapse; width: 100%; font-size: 14px; }
    .content th, .content td { border: 1px solid var(--line); padding: 9px 10px; text-align: left; vertical-align: top; }
    .content th { background: #faf7f2; }
    .content blockquote { border-left: 4px solid var(--accent); margin: 16px 0; padding: 8px 16px; color: var(--muted); background: #fff8f8; }
    .pill { display: inline-flex; align-items: center; gap: 8px; border-radius: 999px; border: 1px solid var(--line); padding: 8px 11px; color: var(--muted); font-size: 13px; margin: 4px 6px 4px 0; background: #fff; }
    @media (max-width: 900px) { .bar { align-items: flex-start; flex-direction: column; } .tabs { justify-content: flex-start; } .hero { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <div class="brand">
        <div class="eyebrow">AI Planning Package</div>
        <h1 id="title">Planning Package</h1>
        <div class="meta" id="meta"></div>
      </div>
      <nav class="tabs" id="tabs" aria-label="Preview sections"></nav>
    </div>
  </header>
  <main>
    <div class="hero">
      <div class="card diagram" id="diagram"></div>
      <aside class="card pad">
        <div class="eyebrow">Package Contents</div>
        <h2 style="margin: 8px 0 0;">Review-ready output</h2>
        <p class="meta">This preview is generated from local package files. Edit markdown, rebuild preview, and refresh this file.</p>
        <div class="summary-grid" id="summary"></div>
        <div style="margin-top: 18px;" id="links"></div>
      </aside>
    </div>
    <div id="docs"></div>
  </main>
  <script id="package-data" type="application/json">{{PACKAGE_JSON}}</script>
  <script>
    const data = JSON.parse(document.getElementById('package-data').textContent);
    const docs = data.documents || [];
    const byId = (id) => document.getElementById(id);
    byId('title').textContent = data.title || 'Planning Package';
    byId('meta').textContent = [data.slug, data.generatedAt].filter(Boolean).join(' · ');
    byId('diagram').innerHTML = data.diagramSvg || '<div class="empty-diagram">No diagram.svg embedded. Rebuild preview after rendering the planning map.</div>';

    const summary = byId('summary');
    const counts = [
      ['Docs', docs.length],
      ['Open gaps', data.openQuestionCount || 0],
      ['Diagram', data.diagramSvg ? 'SVG' : 'Missing'],
      ['Flow', data.hasFlow ? 'Tracked' : 'Direct']
    ];
    summary.innerHTML = counts.map(([label, value]) => `<div class="metric"><strong>${escapeHtml(String(value))}</strong><span>${escapeHtml(label)}</span></div>`).join('');
    byId('links').innerHTML = docs.map((doc) => `<span class="pill">${escapeHtml(doc.label)} · ${escapeHtml(doc.path)}</span>`).join('');

    const tabs = byId('tabs');
    const container = byId('docs');
    docs.forEach((doc, index) => {
      const button = document.createElement('button');
      button.className = 'tab';
      button.type = 'button';
      button.textContent = doc.label;
      button.setAttribute('aria-selected', index === 0 ? 'true' : 'false');
      button.addEventListener('click', () => activate(doc.id));
      tabs.appendChild(button);

      const section = document.createElement('section');
      section.className = `doc card ${index === 0 ? 'active' : ''}`;
      section.id = `doc-${doc.id}`;
      section.innerHTML = `<h2>${escapeHtml(doc.label)}</h2><div class="content">${renderMarkdown(doc.content || '')}</div>`;
      container.appendChild(section);
    });

    function activate(id) {
      document.querySelectorAll('.tab').forEach((button) => button.setAttribute('aria-selected', button.textContent === docs.find((doc) => doc.id === id)?.label ? 'true' : 'false'));
      document.querySelectorAll('section.doc').forEach((section) => section.classList.toggle('active', section.id === `doc-${id}`));
    }

    function escapeHtml(value) {
      return value.replace(/[&<>'"]/g, (ch) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[ch]));
    }

    function renderMarkdown(markdown) {
      const lines = markdown.replace(/\r\n/g, '\n').split('\n');
      let html = '';
      let inCode = false;
      let code = [];
      let table = [];
      const flushTable = () => {
        if (!table.length) return;
        const rows = table.map((line) => line.trim().replace(/^\||\|$/g, '').split('|').map((cell) => escapeHtml(cell.trim())));
        const body = rows.filter((row) => !row.every((cell) => /^:?-{3,}:?$/.test(cell)));
        html += '<table>' + body.map((row, i) => `<tr>${row.map((cell) => i === 0 ? `<th>${cell}</th>` : `<td>${cell}</td>`).join('')}</tr>`).join('') + '</table>';
        table = [];
      };
      for (const line of lines) {
        if (line.startsWith('```')) {
          if (inCode) { html += `<pre><code>${escapeHtml(code.join('\n'))}</code></pre>`; code = []; inCode = false; }
          else { flushTable(); inCode = true; }
          continue;
        }
        if (inCode) { code.push(line); continue; }
        if (/^\s*\|.+\|\s*$/.test(line)) { table.push(line); continue; }
        flushTable();
        if (!line.trim()) { html += '<br />'; continue; }
        const heading = line.match(/^(#{1,4})\s+(.+)$/);
        if (heading) { const level = heading[1].length; html += `<h${level}>${inline(heading[2])}</h${level}>`; continue; }
        if (/^>\s+/.test(line)) { html += `<blockquote>${inline(line.replace(/^>\s+/, ''))}</blockquote>`; continue; }
        if (/^[-*]\s+/.test(line)) { html += `<p>• ${inline(line.replace(/^[-*]\s+/, ''))}</p>`; continue; }
        if (/^\d+\.\s+/.test(line)) { html += `<p>${inline(line)}</p>`; continue; }
        html += `<p>${inline(line)}</p>`;
      }
      flushTable();
      return html;
    }

    function inline(value) {
      return escapeHtml(value)
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
    }
  </script>
</body>
</html>
